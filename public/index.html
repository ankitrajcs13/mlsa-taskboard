<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MLSA TaskBoard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #ffffff; color: #222; min-height: 100vh; }

    header {
      background: #f5f5f5;
      border-bottom: 2px solid #0078d4;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 20px; color: #222; }
    header span { font-size: 12px; color: #0078d4; font-weight: 600; letter-spacing: 1px; }

    .input-row {
      display: flex;
      gap: 10px;
      padding: 24px 32px 0;
      max-width: 600px;
    }
    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 6px;
      border: 1px solid #ccc;
      background: #fff;
      color: #222;
      font-size: 14px;
    }
    .input-row input:focus { outline: none; border-color: #0078d4; }
    .input-row button {
      padding: 10px 20px;
      background: #0078d4;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }
    .input-row button:hover { background: #005a9e; }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      padding: 24px 32px;
    }
    .column {
      background: #f0f0f0;
      border-radius: 10px;
      padding: 16px;
      border-top: 3px solid;
    }
    .column.todo { border-color: #888; }
    .column.in-progress { border-color: #f0a500; }
    .column.done { border-color: #00c853; }

    .column h2 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 14px;
      color: #666;
    }
    .column.todo h2 { color: #666; }
    .column.in-progress h2 { color: #f0a500; }
    .column.done h2 { color: #00c853; }

    .task-card {
      background: #fff;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      border: 1px solid #ddd;
    }
    .task-card span { font-size: 14px; flex: 1; line-height: 1.5; }
    .task-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .task-actions button {
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-progress { background: #f0a500; color: #000; }
    .btn-done { background: #00c853; color: #000; }
    .btn-delete { background: #c62828; color: #fff; }
    .btn-todo { background: #555; color: #fff; }

    .empty { color: #999; font-size: 13px; text-align: center; padding: 20px 0; }
  </style>
</head>
<body>

<header>
  <h1>🚀 MLSA TaskBoard</h1>
  <span>Microsoft Learn Student Ambassadors — CI/CD Demo by Ankit</span>
</header>

<div class="input-row">
  <input type="text" id="taskInput" placeholder="Add a new task..." />
  <button onclick="createTask()">+ Add Task</button>
</div>

<div class="board">
  <div class="column todo">
    <h2>📋 To Do</h2>
    <div id="col-todo"></div>
  </div>
  <div class="column in-progress">
    <h2>⚙️ In Progress</h2>
    <div id="col-in-progress"></div>
  </div>
  <div class="column done">
    <h2>✅ Done</h2>
    <div id="col-done"></div>
  </div>
</div>

<script>
  async function loadTasks() {
    const res = await fetch("/api/tasks");
    const tasks = await res.json();
    ["todo", "in-progress", "done"].forEach(s => {
      document.getElementById("col-" + s).innerHTML = "";
    });
    if (tasks.length === 0) {
      document.getElementById("col-todo").innerHTML = '<p class="empty">No tasks yet. Add one above!</p>';
    }
    tasks.forEach(renderTask);
  }

  function renderTask(task) {
    const col = document.getElementById("col-" + task.status);
    const card = document.createElement("div");
    card.className = "task-card";
    let actions = `<button class="btn-delete" onclick="deleteTask('${task.id}')">Delete</button>`;
    if (task.status === "todo") actions = `<button class="btn-progress" onclick="updateStatus('${task.id}','in-progress')">Start</button>` + actions;
    if (task.status === "in-progress") actions = `<button class="btn-done" onclick="updateStatus('${task.id}','done')">Done</button>` + actions;
    if (task.status === "done") actions = `<button class="btn-todo" onclick="updateStatus('${task.id}','todo')">Reopen</button>` + actions;
    card.innerHTML = `<span>${task.title}</span><div class="task-actions">${actions}</div>`;
    col.appendChild(card);
  }

  async function createTask() {
    const input = document.getElementById("taskInput");
    const title = input.value.trim();
    if (!title) return;
    await fetch("/api/tasks", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ title })
    });
    input.value = "";
    loadTasks();
  }

  async function updateStatus(id, status) {
    await fetch(`/api/tasks/${id}`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ status })
    });
    loadTasks();
  }

  async function deleteTask(id) {
    await fetch(`/api/tasks/${id}`, { method: "DELETE" });
    loadTasks();
  }

  document.getElementById("taskInput").addEventListener("keydown", e => {
    if (e.key === "Enter") createTask();
  });

  loadTasks();
</script>
</body>
</html>
